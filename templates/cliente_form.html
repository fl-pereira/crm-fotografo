{% extends "base.html" %}

{% block content %}
<h2>{% if cliente %}Editar{% else %}Novo{% endif %} Cliente</h2>
<form method="POST">
    <div class="mb-3">
        <label for="nome_completo" class="form-label">Nome Completo</label>
        <input type="text" class="form-control" id="nome_completo" name="nome_completo" 
               value="{{ cliente.nome_completo if cliente else '' }}" required>
    </div>
    
    <div class="mb-3">
        <label for="cpf" class="form-label">CPF</label>
        <input type="text" class="form-control" id="cpf" name="cpf" 
               value="{{ cliente.cpf if cliente else '' }}" 
               placeholder="000.000.000-00" required>
    </div>
    
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" 
               value="{{ cliente.email if cliente else '' }}">
    </div>
    
    <div class="mb-3">
        <label for="whatsapp" class="form-label">WhatsApp</label>
        <input type="text" class="form-control" id="whatsapp" name="whatsapp" 
               value="{{ cliente.whatsapp if cliente else '' }}" 
               placeholder="(00) 00000-0000">
    </div>
    
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="{{ url_for('listar_clientes') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
